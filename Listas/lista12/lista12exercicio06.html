<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Viva de Filmes Favoritos</title>
</head>
<body>

    Digite o nome do filme favorito:<br>
    <input type="text" id="input_filme"><br>
    <button onclick="cadastrar()">Cadastrar</button>

    <div id="div_mensagem"></div>
    
</body>
</html>

<script>
    var lista = [];
    var mensagem = "";

    function cadastrar() {
        var filme = input_filme.value;
        lista.push(filme);

        mensagem = "";
        for (var i = 0; i < lista.length; i++) {
            mensagem += `${lista[i]}<br>`;
        }

        div_mensagem.innerHTML = mensagem;
    }
</script>
