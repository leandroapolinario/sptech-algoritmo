<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema avançado de estoque</title>
</head>
<body>
    <p>Nome do produto</p>
    <input type="text" id="input_nome">
    <p>Preço de compra</p>
    <input type="number" id="input_preco">
    <br><br>
    <button onclick="cadastrar()">Cadastrar</button>
    <br><br>
    <button onclick="relatorio()">Relatório de estoque</button>
    <br><br>
    <p id="p_mensagem"></p>
    <br><br>
    <p id="p_mensagem2"></p>
    <br><br>
    <p id="p_mensagem3"></p>
</body>
</html>
<script>

    var nomes = [];
    var precosCompra = [];
    var precosVenda = [];

    function cadastrar(){
        nomes.push(input_nome.value);
        precosCompra.push(Number(input_preco.value));
        precosVenda.push(Number(input_preco.value) * 1.25);

        p_mensagem.innerHTML = `Produto cadastrado com sucesso! Produtos cadastrados: ${nomes.length}`;
    }

    function relatorio(){
        var totalProdutos = nomes.length;
        var mensagem2 = `Total de produtos: ${totalProdutos}<br><br>`;

        if(totalProdutos > 0){
            var soma = 0;
            var somaPrecoVenda = 0;
            var precoMax = 0;
            var precoMin = precosCompra[0];
            var produtoPrecoMax = "";
            var produtoPrecoMin = nomes[0];
            var mensagem3 = "";

            for(var i = 0; i < totalProdutos; i++){
                mensagem2 += `Produto ${i + 1}: ${nomes[i]}<br><br>
                Preço de compra: R$${precosCompra[i]}. Vender por R$${precosVenda[i]}<br><br>`;

                soma += precosCompra[i];
                somaPrecoVenda += precosVenda[i];

                if(precosCompra[i] > precoMax){
                    precoMax = precosCompra[i];
                    produtoPrecoMax = nomes[i];
                }

                if(precosCompra[i] < precoMin){
                    precoMin = precosCompra[i];
                    produtoPrecoMin = nomes[i];
                }
            }

            var mediaPrecoVenda = somaPrecoVenda / totalProdutos;

            mensagem3 = `Produto mais caro: ${produtoPrecoMax} (R$${precoMax})
            <br><br>
            Produto mais barato: ${produtoPrecoMin} (R$${precoMin})
            <br><br>
            Soma dos preços de compra: R$${soma}
            <br><br>
            Média dos preços de venda: R$${mediaPrecoVenda.toFixed(2)}`;

            p_mensagem2.innerHTML = mensagem2;
            p_mensagem3.innerHTML = mensagem3;

        } else {
            p_mensagem2.innerHTML = `Sem produtos cadastrados. Cadastre produtos para receber o relatório de estoque.`;
        }
    }

</script>
