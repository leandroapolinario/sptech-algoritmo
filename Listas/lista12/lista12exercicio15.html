<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de produtos</title>
</head>
<body>
    <p>Nome do produto</p>
    <input type="text" id="input_nome">
    <p>Preço de compra</p>
    <input type="number" id="input_preco">
    <br><br>
    <button onclick="cadastrar()">Cadastrar</button>
    <br><br>
    <button onclick="relatorio()">Relatório de estoque</button>
    <br><br>
    <p id="p_mensagem"></p>
    <br><br>
    <p id="p_mensagem2"></p>
</body>
</html>
<script>
    var nomes = [];
    var precosCompra = [];
    var precosVenda = [];

    function cadastrar(){
        var nome = input_nome.value;
        var preco = Number(input_preco.value);
        var venda = preco * 1.25;

        nomes.push(nome);
        precosCompra.push(preco);
        precosVenda.push(venda);

        p_mensagem.innerHTML = `Produto cadastrado com sucesso!`;
    }

    function relatorio(){
        var totalProdutos = nomes.length;

        var mensagem = `Total de produtos: ${totalProdutos}<br><br>`;

        for(var i = 0; i < totalProdutos; i++){
            mensagem += `Produto ${i + 1}: ${nomes[i]}<br><br>
                         Preço de compra: R$${precosCompra[i]}. Vender por R$${precosVenda[i]}<br><br>`;
        }

        p_mensagem2.innerHTML = mensagem;
    }
</script>
