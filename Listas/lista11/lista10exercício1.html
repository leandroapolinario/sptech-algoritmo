<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie um programa o qual</title>
</head>
<body>
    
<button onclick="gerar()">Sortear</button>
<div id="div_mensagem"></div>

</body>
</html>

<script>
function gerar(){
    var mensagem = "";

    var aleatoria = Math.random();

    if (aleatoria > 0.5){

        mensagem +=  "Eu arredondaria para 1";
    } else {
        mensagem +=  "Eu arredondaria para 0";
    }

    div_mensagem.innerHTML = mensagem;

}


</script>
