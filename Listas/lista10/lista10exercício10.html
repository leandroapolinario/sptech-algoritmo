<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fases da Vida</title>
</head>
<body>

    
    Digite sua idade:
    <input type="number" id="input_idade" oninput="mostrarFases()">

 
    <div id="div_mensagem"></div>
    
</body>
</html>



<script>
   function mostrarFases(){
       
        var idade = Number(input_idade.value);
        texto = "";


        for(var i = 0; i <= idade; i++){

            var fase = "";

        if (i <= 4){
            fase = `Primeira infância`;
        }else if(i <= 6){
            fase = `Pré-escolar`

               } else if (i <= 10) {
                    fase = "Segunda Infância";
                } else if (i <= 18) {
                    fase = "Adolescência";
                } else if (i <= 50) {
                    fase = "Adulto";
                } else if (i <= 100) {
                    fase = "Melhor idade";
                } else {
                    fase = "Matusalém";
                }

                texto += `${i} anos (${fase})<br>`;
            }

            div_mensagem.innerHTML = texto;

        }
    </script>
