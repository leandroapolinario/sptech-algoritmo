<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Quantidade de Macarons<br>
    <input type="text" id="input_numero1"><br>
    Quantidade de Brigadeiros<br>
    <input type="text" id="input_numero2"><br>
    Quantidade de Cupcakes<br>
     <input type="text" id="input_numero4"><br>
    Quantidade de Cheesecakes<br>
     <input type="text" id="input_numero5"><br>

     <br><br>
     
    Preço da Unidade de Macarons<br>
    <input type="text" id="input_preco1"><br>
    Preço da Unidade de Brigadeiros<br>
    <input type="text" id="input_preco2"><br>
    Preço da Unidade de Cupcakes<br>
     <input type="text" id="input_preco4"><br>
     Preço da Unidade de Cheesecakes<br>
     <input type="text" id="input_preco5"><br>

     <button onclick="analisar()">Verificar Vendas</button>

     <div id="div_mensagem"></div>

    
</body>
</html>

<script>
    function analisar(){
        
        var QM = Number(input_numero1.value);
        var QB = Number(input_numero2.value);
        var QC = Number(input_numero4.value);
        var QCh = Number(input_numero5.value);
        var PM = Number(input_preco1.value);
        var PB = Number(input_preco2.value);
        var PC = Number(input_preco4.value);
        var PCh = Number(input_preco5.value);

        var mensagem = ""

        if (QM < 0 || QB < 0 || QC < 0 || PM < 0 || PB < 0 || PC < 0 || PCh < 0){
            mensagem.innerHTML = `os números precisam ser positivos`
        } else {

            var vendas = 0;
            var contador = 1;

            while (contador <= QM){
                vendas++;
                mensagem += `Venda ${vendas} <img style= "width: 42px; height: 42px;"src="https://img.freepik.com/fotos-premium/macaron-em-fundo-branco_398492-10808.jpg" alt=""> ${PM}<br> `;
                contador++;
            }

            contador = 1;

            
            while (contador <= QB){
                vendas++;
                mensagem += `Venda ${vendas} <img style= "width: 42px; height: 42px;"src="https://www.marajoaraalimentos.com.br/2018/wp-content/uploads/2020/07/349-scaled.jpg" alt="">   ${QB}<br> `;
                contador++;
            }

            contador = 1;

            
            while (contador <= QC){
                vendas++;
                mensagem += `Venda ${vendas} <img style= "width: 42px; height: 42px;"src="https://img.freepik.com/fotos-premium/um-cupcake-em-um-fundo-branco_136558-2687.jpg" alt="">     ${PC}<br> `;
                contador++;
            }

            contador = 1;

            
            while (contador <= QCh){
                vendas++;
                mensagem += `Venda ${vendas} <img style= "width: 42px; height: 42px;"src="https://doceamor.com/wp-content/uploads/2018/07/cheesecake-frutas-vermelhas-zero_fundo-branco.jpg" alt="">        ${QCh}<br> `;
                contador++;
            }


            mensagem += `<br><br>Com a quantidade de ${QM} Macarons, ${QB} Brigadeiros, ${QC} Cupcakes e ${QCh} Cheesecakes, a venda totalizará R$${(QM * PM) + (QB * PB) + (QC * PC) + (QCh * PCh)}`
            
            div_mensagem.innerHTML = `${mensagem}`;
        }

    }



</script>
